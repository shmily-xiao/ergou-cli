<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ergou CLI - Agent 监控大盘</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .last-update {
            color: #666;
            font-size: 14px;
        }

        .refresh-info {
            background: #e3f2fd;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
            color: #1976d2;
            font-size: 14px;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .card h2 {
            color: #333;
            font-size: 20px;
            margin-bottom: 15px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .agent-item {
            background: #f5f5f5;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            transition: all 0.3s ease;
        }

        .agent-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.15);
        }

        .agent-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .agent-name {
            font-weight: bold;
            color: #333;
            font-size: 16px;
        }

        .agent-status {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .status-working {
            background: #fff3cd;
            color: #856404;
        }

        .status-idle {
            background: #d4edda;
            color: #155724;
        }

        .status-review {
            background: #cce5ff;
            color: #004085;
        }

        .status-completed {
            background: #d4edda;
            color: #155724;
        }

        .status-failed {
            background: #f8d7da;
            color: #721c24;
        }

        .agent-model {
            color: #666;
            font-size: 13px;
            margin-bottom: 5px;
        }

        .agent-task {
            color: #333;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .progress-bar {
            background: #e0e0e0;
            border-radius: 10px;
            height: 8px;
            overflow: hidden;
            margin-top: 10px;
        }

        .progress-fill {
            background: linear-gradient(90deg, #667eea, #764ba2);
            height: 100%;
            transition: width 0.5s ease;
        }

        .task-list {
            list-style: none;
        }

        .task-item {
            background: #f5f5f5;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
        }

        .task-id {
            background: #667eea;
            color: white;
            padding: 3px 8px;
            border-radius: 5px;
            font-size: 12px;
            font-weight: bold;
            margin-right: 10px;
        }

        .task-name {
            color: #333;
            font-size: 14px;
        }

        .task-agent {
            color: #666;
            font-size: 12px;
            margin-top: 5px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .stat-item {
            background: #f5f5f5;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }

        .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 5px;
        }

        .stat-label {
            color: #666;
            font-size: 13px;
        }

        .log-container {
            background: #1e1e1e;
            color: #d4d4d4;
            border-radius: 8px;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 300px;
            overflow-y: auto;
        }

        .log-entry {
            margin-bottom: 5px;
        }

        .log-time {
            color: #569cd6;
        }

        .log-level-info {
            color: #4ec9b0;
        }

        .log-level-start {
            color: #dcdcaa;
        }

        .log-level-progress {
            color: #ce9178;
        }

        footer {
            background: white;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            color: #666;
            font-size: 14px;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .loading {
            animation: pulse 1.5s ease-in-out infinite;
        }

        .alert {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            color: #856404;
        }

        .alert-error {
            background: #f8d7da;
            border-left-color: #dc3545;
            color: #721c24;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎯 Ergou CLI Agent 监控大盘</h1>
            <div class="last-update" id="lastUpdate">最后更新：加载中...</div>
            <div class="refresh-info">
                🔄 自动刷新：<span id="countdown">60</span>秒后刷新
            </div>
        </header>

        <div id="alerts"></div>

        <div class="dashboard">
            <!-- Agent 状态 -->
            <div class="card">
                <h2>🤖 Agent 状态</h2>
                <div id="agentList" class="loading">加载中...</div>
            </div>

            <!-- 任务队列 -->
            <div class="card">
                <h2>📋 任务队列</h2>
                <div id="taskQueue" class="loading">加载中...</div>
            </div>

            <!-- 性能指标 -->
            <div class="card">
                <h2>📊 性能指标</h2>
                <div class="stats-grid" id="statsGrid">
                    <div class="stat-item">
                        <div class="stat-value" id="totalTasks">-</div>
                        <div class="stat-label">总任务数</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="workingTasks">-</div>
                        <div class="stat-label">进行中</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="completedTasks">-</div>
                        <div class="stat-label">已完成</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="failedTasks">-</div>
                        <div class="stat-label">失败</div>
                    </div>
                </div>
            </div>

            <!-- 执行日志 -->
            <div class="card">
                <h2>📝 执行日志</h2>
                <div class="log-container" id="logContainer">
                    <div class="log-entry">
                        <span class="log-time">[21:10:00]</span>
                        <span class="log-level-info">[SYSTEM]</span>
                        监控系统启动
                    </div>
                </div>
            </div>
        </div>

        <footer>
            <p>Ergou CLI Agent Monitor v1.0.0</p>
            <p>GitHub: <a href="https://github.com/shmily-xiao/ergou-cli" target="_blank">shmily-xiao/ergou-cli</a></p>
        </footer>
    </div>

    <script>
        // 配置
        const CONFIG = {
            refreshInterval: 60, // 刷新间隔（秒）
            dataFile: 'AGENT_STATUS.json',
            logFile: 'logs/agent-status.log'
        };

        let countdown = CONFIG.refreshInterval;

        // 格式化时间
        function formatTime(date) {
            return date.toLocaleTimeString('zh-CN', {
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
        }

        // 更新最后更新时间
        function updateLastUpdate() {
            const now = new Date();
            document.getElementById('lastUpdate').textContent = 
                `最后更新：${formatTime(now)}`;
        }

        // 倒计时
        function startCountdown() {
            const countdownEl = document.getElementById('countdown');
            countdown = CONFIG.refreshInterval;
            countdownEl.textContent = countdown;

            const interval = setInterval(() => {
                countdown--;
                countdownEl.textContent = countdown;
                
                if (countdown <= 0) {
                    clearInterval(interval);
                    loadData();
                    countdown = CONFIG.refreshInterval;
                }
            }, 1000);
        }

        // 加载数据
        async function loadData() {
            try {
                // 在实际应用中，这里会 fetch JSON 文件
                // 由于是本地文件，我们使用模拟数据
                const data = getMockData();
                renderDashboard(data);
                updateLastUpdate();
                addLog('SYSTEM', 'INFO', '数据刷新成功');
            } catch (error) {
                console.error('加载数据失败:', error);
                addLog('SYSTEM', 'ERROR', `加载数据失败：${error.message}`);
            }
        }

        // 模拟数据（实际应用中会从文件读取）
        function getMockData() {
            return {
                lastUpdate: new Date().toISOString(),
                agents: {
                    'ai-engineer': {
                        status: 'working',
                        currentTask: '001',
                        taskName: 'Anthropic Provider 实现',
                        model: 'qwen3-coder-plus',
                        progress: 35,
                        startTime: new Date().toISOString()
                    },
                    'senior-developer': {
                        status: 'idle',
                        currentTask: null,
                        taskName: null,
                        model: 'qwen3-coder-plus',
                        progress: null,
                        startTime: null
                    },
                    'backend-architect': {
                        status: 'idle',
                        currentTask: null,
                        taskName: null,
                        model: 'qwen3-coder-plus',
                        progress: null,
                        startTime: null
                    },
                    'test-results-analyzer': {
                        status: 'idle',
                        currentTask: null,
                        taskName: null,
                        model: 'qwen3.5-plus',
                        progress: null,
                        startTime: null
                    },
                    'content-creator': {
                        status: 'idle',
                        currentTask: null,
                        taskName: null,
                        model: 'qwen3.5-plus',
                        progress: null,
                        startTime: null
                    }
                },
                taskQueue: {
                    working: [
                        { id: '001', name: 'Anthropic Provider 实现', agent: 'ai-engineer', progress: 35, priority: 'P0' }
                    ],
                    pending: [
                        { id: '002', name: 'DeepSeek Provider 实现', agent: 'ai-engineer', priority: 'P1' },
                        { id: '003', name: 'OpenAI Provider 实现', agent: 'ai-engineer', priority: 'P1' },
                        { id: '004', name: 'CLI 入口实现', agent: 'senior-developer', priority: 'P0' },
                        { id: '005', name: '工具系统实现', agent: 'backend-architect', priority: 'P1' }
                    ],
                    completed: [],
                    failed: []
                },
                statistics: {
                    today: {
                        totalTasks: 1,
                        working: 1,
                        completed: 0,
                        failed: 0
                    }
                },
                logs: [
                    { time: '21:10:00', level: 'INFO', agent: 'SYSTEM', message: '监控系统启动' },
                    { time: '21:10:00', level: 'START', agent: 'ai-engineer', message: '开始执行任务 001' },
                    { time: '21:10:30', level: 'PROGRESS', agent: 'ai-engineer', message: '进度：35%' }
                ]
            };
        }

        // 渲染仪表盘
        function renderDashboard(data) {
            renderAgents(data.agents);
            renderTaskQueue(data.taskQueue);
            renderStats(data.statistics);
            renderLogs(data.logs || []);
        }

        // 渲染 Agent 列表
        function renderAgents(agents) {
            const container = document.getElementById('agentList');
            container.innerHTML = '';
            container.classList.remove('loading');

            for (const [name, agent] of Object.entries(agents)) {
                const statusText = {
                    'working': '🟡 工作中',
                    'idle': '🟢 空闲',
                    'review': '🔵 审查中',
                    'completed': '✅ 已完成',
                    'failed': '🔴 失败'
                }[agent.status] || agent.status;

                const statusClass = `status-${agent.status}`;

                const agentEl = document.createElement('div');
                agentEl.className = 'agent-item';
                agentEl.innerHTML = `
                    <div class="agent-header">
                        <span class="agent-name">${name}</span>
                        <span class="agent-status ${statusClass}">${statusText}</span>
                    </div>
                    <div class="agent-model">模型：${agent.model}</div>
                    ${agent.taskName ? `<div class="agent-task">任务：${agent.taskName}</div>` : ''}
                    ${agent.progress !== null ? `
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${agent.progress}%"></div>
                        </div>
                        <div style="text-align: right; font-size: 12px; color: #666; margin-top: 5px;">${agent.progress}%</div>
                    ` : ''}
                `;
                container.appendChild(agentEl);
            }
        }

        // 渲染任务队列
        function renderTaskQueue(taskQueue) {
            const container = document.getElementById('taskQueue');
            container.innerHTML = '';
            container.classList.remove('loading');

            let html = '<ul class="task-list">';

            // 进行中
            taskQueue.working.forEach(task => {
                html += `
                    <li class="task-item">
                        <div>
                            <span class="task-id">${task.id}</span>
                            <span class="task-name">${task.name}</span>
                        </div>
                        <div class="task-agent">执行：${task.agent} · 优先级：${task.priority}</div>
                        <div class="progress-bar" style="margin-top: 10px;">
                            <div class="progress-fill" style="width: ${task.progress || 0}%"></div>
                        </div>
                    </li>
                `;
            });

            // 待执行
            taskQueue.pending.forEach(task => {
                html += `
                    <li class="task-item">
                        <div>
                            <span class="task-id" style="background: #6c757d;">${task.id}</span>
                            <span class="task-name">${task.name}</span>
                        </div>
                        <div class="task-agent">待执行 · 优先级：${task.priority}</div>
                    </li>
                `;
            });

            html += '</ul>';
            container.innerHTML = html;
        }

        // 渲染统计
        function renderStats(statistics) {
            document.getElementById('totalTasks').textContent = statistics.today.totalTasks;
            document.getElementById('workingTasks').textContent = statistics.today.working;
            document.getElementById('completedTasks').textContent = statistics.today.completed;
            document.getElementById('failedTasks').textContent = statistics.today.failed;
        }

        // 渲染日志
        function renderLogs(logs) {
            const container = document.getElementById('logContainer');
            container.innerHTML = '';

            logs.forEach(log => {
                const levelClass = `log-level-${log.level.toLowerCase()}`;
                const entry = document.createElement('div');
                entry.className = 'log-entry';
                entry.innerHTML = `
                    <span class="log-time">[${log.time}]</span>
                    <span class="${levelClass}">[${log.agent}]</span>
                    ${log.message}
                `;
                container.appendChild(entry);
            });

            container.scrollTop = container.scrollHeight;
        }

        // 添加日志
        function addLog(agent, level, message) {
            const container = document.getElementById('logContainer');
            const time = formatTime(new Date());
            const levelClass = `log-level-${level.toLowerCase()}`;
            
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `
                <span class="log-time">[${time}]</span>
                <span class="${levelClass}">[${agent}]</span>
                ${message}
            `;
            container.appendChild(entry);
            container.scrollTop = container.scrollHeight;
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            loadData();
            startCountdown();
        });
    </script>
</body>
</html>
